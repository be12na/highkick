<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taekwondo Management - Login</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="container center-screen">
      <section class="card login-card">
        <h1>Taekwondo Management</h1>
        <p class="muted">Pilih jenis login</p>
        <div class="grid-two">
          <button id="btn-show-anggota" class="btn" type="button">Login Anggota</button>
          <button id="btn-show-admin" class="btn btn-secondary" type="button">Login Admin</button>
        </div>

        <form id="form-login-anggota" class="form-block hidden">
          <h2>Login Anggota</h2>
          <label>Nomor Anggota</label>
          <input name="nomor_anggota" placeholder="Contoh: TKD-001" required />
          <button class="btn" type="submit">Masuk</button>
        </form>

        <form id="form-login-admin" class="form-block hidden">
          <h2>Login Admin</h2>
          <label>Email Admin</label>
          <input name="email_admin" type="email" required />
          <label>Password / PIN</label>
          <input name="password_pin" type="password" required />
          <label>Admin API Key</label>
          <input name="admin_api_key" type="password" placeholder="Internal key untuk route admin" required />
          <button class="btn" type="submit">Masuk</button>
        </form>

        <p id="auth-message" class="message"></p>
      </section>
    </main>

    <script src="./js/app.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
  </body>
</html>
