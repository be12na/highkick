<!doctype html>
<!--
  Tujuan file/module: Merender halaman login utama aplikasi Highkick Taekwondo.
  Pemakai oleh siapa: Browser user sebelum masuk ke dashboard admin atau anggota.
  Dependensi utama: /web/css/style.css, /web/js/app.js, /web/js/api.js, /web/js/auth.js.
  Daftar fungsi public/utama: Menampilkan branding, pilihan jenis login, dan form login admin/anggota.
  Side effect penting: Memuat aset logo lokal dan menjalankan alur autentikasi di sisi klien.
-->
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HIGHKICK TAEKWONDO JOGJA - Login</title>
    <link rel="stylesheet" href="/web/css/style.css" />
  </head>
  <body>
    <main class="container center-screen">
      <section class="card login-card">
        <div class="brand-block brand-block--center">
          <img
            class="brand-logo"
            src="/web/assets/highkick-logo.jpg"
            alt="Logo HIGHKICK TAEKWONDO JOGJA"
            decoding="async"
          />
          <div class="brand-copy">
            <p class="brand-kicker">Official Dojang</p>
            <h1 class="brand-title">HIGHKICK TAEKWONDO JOGJA</h1>
            <p class="brand-subtitle">Portal login anggota dan admin.</p>
          </div>
        </div>
        <p class="muted">Pilih jenis login</p>
        <div class="grid-two">
          <button id="btn-show-anggota" class="btn" type="button">Login Anggota</button>
          <button id="btn-show-admin" class="btn btn-secondary" type="button">Login Admin</button>
        </div>

        <form id="form-login-anggota" class="form-block hidden">
          <h2>Login Anggota</h2>
          <label>Nomor Anggota</label>
          <input name="nomor_anggota" placeholder="Contoh: TKD-001" required />
          <button class="btn" type="submit">Masuk</button>
        </form>

        <form id="form-login-admin" class="form-block hidden">
          <h2>Login Admin</h2>
          <label>Email Admin</label>
          <input name="email_admin" type="email" required />
          <label>Password / PIN</label>
          <input name="password_pin" type="password" required />
          <label>Admin API Key</label>
          <input name="admin_api_key" type="password" placeholder="Internal key untuk route admin" required />
          <button class="btn" type="submit">Masuk</button>
        </form>

        <p id="auth-message" class="message"></p>
      </section>
    </main>

    <script src="/web/js/app.js"></script>
    <script src="/web/js/api.js"></script>
    <script src="/web/js/auth.js"></script>
  </body>
</html>
